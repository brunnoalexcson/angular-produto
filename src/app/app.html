<div class="container">
  <app-produto
    *ngFor="let produto of produtos"
    [produto]="produto"
  ></app-produto>

  <h1>Nome:</h1>
  <input 
    type="text" 
    [(ngModel)]="name"
    (ngModelChange)="handleInputChange($event)"
  />

  <h1>Nome digitado: {{ name }}</h1> <!-- Automaticamente muda -->

  <br><br>
  <button (click)="handleBotaoDinamico()">{{botaoDinamico}}</button><br>
  <h1 *ngIf="showDiv">Esse elemento só existe no DOM se a condição for verdadeira</h1>
</div>

<!--
  [ngModel]="name" <-- Input
  (ngModelChange)="handleInputChange($event)" <-- Output
-->
